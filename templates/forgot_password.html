<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Dental Pricing Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Rubik:wght@300;400;500;600&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/tokens.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="auth-centered">
        <div class="auth-card" style="text-align: left;">
            <div style="text-align: center; margin-bottom: 24px;">
                <div class="auth-card-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
                <h1>Forgot Password</h1>
                <p>Enter your email to receive a password reset link</p>
            </div>

            <div id="statusMessage" class="status-box hidden"></div>

            <form id="forgotForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" id="email" name="email" required autofocus
                           placeholder="Enter your registered email" dir="ltr">
                </div>

                <button type="submit" class="btn-login" id="submitBtn">Send Reset Link</button>
            </form>

            <div class="auth-footer">
                <p>Remember your password? <a href="/">Back to Login</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const statusDiv = document.getElementById('statusMessage');
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.textContent;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';
            statusDiv.classList.add('hidden');

            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                statusDiv.classList.remove('hidden');
                if (response.ok) {
                    statusDiv.className = 'status-box success';
                    statusDiv.textContent = data.message;
                    document.getElementById('forgotForm').reset();
                } else {
                    statusDiv.className = 'status-box error';
                    statusDiv.textContent = data.error || 'Failed to send reset email';
                }
            } catch (error) {
                statusDiv.classList.remove('hidden');
                statusDiv.className = 'status-box error';
                statusDiv.textContent = 'Network error. Please try again.';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });
    </script>
</body>
</html>
